name: ${COMPOSE_PROJECT_NAME:-todoist}

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    init: true
    environment:
      APP_NAME: To-do API
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: http://localhost:${BACKEND_PORT:-8000}
      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DB_CONNECTION: sqlite
      DB_DATABASE: /data/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3000}
      SEED_DATABASE: ${SEED_DATABASE:-true}
      PORT: 8000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - todo_sqlite:/data
    healthcheck:
      test:
        - CMD
        - php
        - -r
        - >-
          $$context = stream_context_create(['http' => ['timeout' => 2, 'ignore_errors' => true]]);
          @file_get_contents('http://127.0.0.1:8000/up', false, $$context);
          exit(isset($$http_response_header[0]) && preg_match('/^HTTP\/\S+ 200\b/', $$http_response_header[0]) ? 0 : 1);
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000/api}
        NUXT_PUBLIC_DEMO_MODE: ${NUXT_PUBLIC_DEMO_MODE:-false}
    init: true
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000/api}
      NUXT_PUBLIC_DEMO_MODE: ${NUXT_PUBLIC_DEMO_MODE:-false}
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

volumes:
  todo_sqlite:
