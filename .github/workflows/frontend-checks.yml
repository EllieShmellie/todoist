name: Frontend Checks

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-checks.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-checks.yml'

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
